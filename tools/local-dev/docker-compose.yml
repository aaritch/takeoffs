# Local development stack for the Takeoff Platform.
#
# Mirrors the hosted data layer so the app/workers run end-to-end locally without cloud
# accounts. Prod equivalents (see STATE §7): Postgres -> Neon (+PostGIS); Redis -> Upstash;
# object storage -> Vercel Blob (MinIO is the local S3-compatible stand-in). The app talks
# to storage through an adapter so the local/prod swap is config-only.
#
# Usage (from repo root): pnpm dev:up | pnpm dev:down | pnpm dev:reset | pnpm dev:logs
# Credentials here are LOCAL-ONLY and intentionally non-secret.

name: takeoff-dev

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: takeoff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: takeoff
      POSTGRES_PASSWORD: takeoff
      POSTGRES_DB: takeoff
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U takeoff -d takeoff']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: takeoff-redis
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object storage (local stand-in for Vercel Blob).
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: takeoff-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: takeoff
      MINIO_ROOT_PASSWORD: takeoffdev
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the dev bucket, then exit.
  minio-setup:
    image: minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: takeoff-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 takeoff takeoffdev &&
        mc mb --ignore-existing local/takeoff-dev &&
        echo "bucket local/takeoff-dev ready"
    restart: 'no'

volumes:
  pgdata:
  redisdata:
  miniodata:
